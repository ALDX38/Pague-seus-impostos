<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico - Imposto de Renda</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .chart-container {
            position: relative;
            width: 90vw;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="chart-container">
                <canvas id="graficoIR"></canvas>
            </div>

    <script>
        // Função 1: Tabela Atual
        function calcularIR(salario) {
            if (salario <= 2259.20) return 0;
            if (salario <= 2826.65) return (salario * 0.075) - 169.44;
            if (salario <= 3751.05) return (salario * 0.15) - 381.44;
            if (salario <= 4664.68) return (salario * 0.225) - 662.77;
            return (salario * 0.275) - 896.00;
        }

        // Função 2: Nova Regra (Isenção até 5000)
        function calcularIRNovo(salario) {
            if (salario <= 5000) return 0;
            // Projeção simples baseada no excedente após 5k
            if (salario <= 6000) return (salario - 5000) * 0.075;
            if (salario <= 7000) return (1000 * 0.075) + ((salario - 6000) * 0.15);
            if (salario <= 8000) return (1000 * 0.075) + (1000 * 0.15) + ((salario - 7000) * 0.225);
            return (1000 * 0.075) + (1000 * 0.15) + (1000 * 0.225) + ((salario - 8000) * 0.275);
        }

        const salariosEixoX = [];
        const impostoEixoY_Antigo = [];
        const impostoEixoY_Novo = [];

        for (let i = 0; i <= 15000; i += 500) {
            salariosEixoX.push(i);
            impostoEixoY_Antigo.push(calcularIR(i));
            impostoEixoY_Novo.push(calcularIRNovo(i));
        }

        const ctx = document.getElementById('graficoIR').getContext('2d');
        
        // Inicializando o gráfico já com os dois datasets (Antigo e Novo)
        let graficoIR = new Chart(ctx, {
            type: 'line',
            data: {
                labels: salariosEixoX,
                datasets: [
                    {
                        label: 'Regra Atual (R$)',
                    data: impostoEixoY_Antigo,
                    borderColor: 'rgba(255, 99, 132, 1)', // Vermelho
                        backgroundColor: 'rgba(255, 99, 132, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.1
                    },
                    {
                        label: 'Nova Regra - Isenção 5k (R$)',
                        data: impostoEixoY_Novo,
                        borderColor: 'rgba(54, 162, 235, 1)', // Azul
                        backgroundColor: 'rgba(54, 162, 235, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.1
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top', // Legenda no topo para facilitar visualização
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                    }
                },
                scales: {
                    x: { 
                        title: { display: true, text: 'Renda Bruta Mensal (R$)' } 
                    },
                    y: { 
                        title: { display: true, text: 'Imposto Devido (R$)' },
                        beginAtZero: true 
                    }
                }
            }
        });
    </script>
</body>
</html>
