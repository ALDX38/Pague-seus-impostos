<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico - Imposto de Renda</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        /* O segredo da responsividade está no container do gráfico */
        .chart-container {
            position: relative;
            width: 90vw; /* 90% da largura da tela */
            max-width: 800px; /* Limite máximo para telas grandes */
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            }
    </style>
</head>
<body>

    <div class="chart-container">
                <canvas id="graficoIR"></canvas>
            </div>

    <script>
        // Função simplificada para calcular o IR (valores aproximados da tabela)
        function calcularIR(salario) {
            if (salario <= 2259.20) return 0;
            if (salario <= 2826.65) return (salario * 0.075) - 169.44;
            if (salario <= 3751.05) return (salario * 0.15) - 381.44;
            if (salario <= 4664.68) return (salario * 0.225) - 662.77;
            return (salario * 0.275) - 896.00;
        }

        // Gerando os dados para o Plano Cartesiano
        const salariosEixoX = [];
        const impostoEixoY = [];

        // Simulando salários de 0 a 10.000 com saltos de 500
        for (let i = 0; i <= 10000; i += 500) {
            salariosEixoX.push(i);
            impostoEixoY.push(calcularIR(i));
        }

        // Configurando e renderizando o gráfico com Chart.js
            const ctx = document.getElementById('graficoIR').getContext('2d');
        const graficoIR = new Chart(ctx, {
            type: 'line', // Gráfico de linha para mostrar a progressão
                data: {
                labels: salariosEixoX,
                datasets: [{
                    label: 'Imposto Devido (R$)',
                    data: impostoEixoY,
                    borderColor: 'rgba(255, 99, 132, 1)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                            borderWidth: 2,
                            fill: true,
                    tension: 0.1 // Suavidade da linha
                }]
                },
                options: {
                responsive: true, // Garante que o gráfico se adapte à tela
                scales: {
                        x: {
                        title: { display: true, text: 'Renda Bruta (R$)' }
                        },
                        y: {
                        title: { display: true, text: 'Imposto Devido (R$)' },
                        beginAtZero: true
                        }
                    }
                }
            });
    </script>
</body>
</html>
